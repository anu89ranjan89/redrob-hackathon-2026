ai_usage_summary: |
  Used Gemini for Streamlit UI generation, refactoring validation scripts, and Jinja2 templating. Used ChatGPT for code review and architectural discussion. No candidate data was sent to external LLMs during pipeline runs.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid candidate ranking system combining skill matching, career history analysis, behavioral signals, recruitability metrics, honeypot detection, and explainable AI ranking. Candidates are scored using technical fit, activity, trust, and recruitability signals, with rule-based Jinja2 explanations.

